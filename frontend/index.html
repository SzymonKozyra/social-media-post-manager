<!DOCTYPE html>
<html lang="pl">
<head>
    <title>Social Media Manager</title>
</head>
<body>
<h1>Social Media Post Manager</h1>
<div id="posts">Loading...</div>
<script>
    fetch('http://localhost:8080/api/v1/posts')
        .then(response => response.json())
        .then(data => {
            const div = document.getElementById('posts');
            div.innerHTML = data.map(p => `<div><h3>${p.title}</h3><p>${p.content}</p></div>`).join('');
        });
</script>
</body>
</html>
