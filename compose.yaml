services:
  db-service:
    build:
      context: .
      dockerfile: Dockerfile.db
    container_name: posts-db-container
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=123
      - POSTGRES_DB=productcataloglab
    volumes:
      - posts-db-data:/var/lib/postgresql
    networks:
      - post-app-network

  app-service:
    build:
      context: .
      dockerfile: Dockerfile.app
    container_name: post-service-container
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_IP=db-service
      - SPRING_DATASOURCE_PORT=5432
      - SPRING_DATASOURCE_DB=productcataloglab
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=123
    depends_on:
      - db-service
    networks:
      - post-app-network

  frontend-service:
    build:
      context: ./frontend
    container_name: frontend-container
    ports:
      - "80:80"
    networks:
      - post-app-network
    depends_on:
      - app-service

networks:
  post-app-network:
    driver: bridge

volumes:
  posts-db-data: