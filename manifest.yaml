# SEKRET - Bezpieczne przechowywanie haseł poza kodem
apiVersion: v1
kind: Secret
metadata:
  name: db-credentials
type: Opaque
data:
  # Hasło "123" zakodowane w base64
  password: MTIz
---

# RESOURCE QUOTA - Ochrona klastra przed atakami DoS i wyczerpaniem zasobów
apiVersion: v1
kind: ResourceQuota
metadata:
  name: project-quota
spec:
  hard:
    requests.cpu: "1"
    requests.memory: 1Gi
    limits.cpu: "2"
    limits.memory: 2Gi
---

# DATABASE
apiVersion: apps/v1
kind: Deployment
metadata:
  name: db-deployment
  annotations:
    kubernetes.io/change-cause: "Inicjalizacja bazy danych PostgreSQL z wolumenem"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: db
  template:
    metadata:
      labels:
        app: db
    spec:
      containers:
        - name: postgres
          image: postgres:latest
          env:
            - name: POSTGRES_DB
              value: "productcataloglab"
            - name: POSTGRES_USER
              value: "postgres"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: password
          ports:
            - containerPort: 5432
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: db-service
spec:
  selector:
    app: db
  ports:
    - port: 5432
      targetPort: 5432
  type: ClusterIP # Izolacja bazy wewnątrz klastra
---

# BACKEND
apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-deployment
  annotations:
    kubernetes.io/change-cause: "Wdrożenie backendu z limitem maxUnavailable: 25%"
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 25% # Procentowa strategia aktualizacji
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: spring-app
          image: szymonkozyra/post-app:latest # LINK DO DOCKER HUB
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          env:
            - name: SPRING_DATASOURCE_IP
              value: "db-service"
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: password
          resources: # Limity dla kontenera
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: app-service
spec:
  selector:
    app: backend
  ports:
    - port: 8080
      targetPort: 8080
  type: ClusterIP
---

# FRONTEND
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-deployment
  annotations:
    kubernetes.io/change-cause: "Wdrożenie frontendu Nginx"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: nginx
          image: szymonkozyra/post-frontend:latest # LINK DO DOCKER HUB
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "100m"
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
spec:
  selector:
    app: frontend
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30080 # Dostęp przez IP minikube:30080
  type: NodePort